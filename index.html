<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcane Descent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Trebuchet MS", "Hiragino Kaku Gothic ProN", sans-serif;
        background:
          radial-gradient(circle at top, #2f1d43 0%, #171222 45%, #09090d 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(111, 64, 146, 0.25), transparent 30%),
          radial-gradient(circle at 80% 15%, rgba(43, 116, 161, 0.2), transparent 22%),
          linear-gradient(180deg, #140f1d 0%, #09090d 100%);
      }

      #app {
        width: min(100vw, 540px);
        height: min(100vh, 960px);
        aspect-ratio: 9 / 16;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
